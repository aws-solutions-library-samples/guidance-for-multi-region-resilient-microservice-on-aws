            {
              "height": 6, "width": 6, "y": 40, "x": 18,
              "type": "metric",
              "properties": {
                "title": "Orders Success Rate (${PrimaryRegion})",
                "metrics": [
                  [ { "expression": "100*(1-(e1+f1)/IF(r1>0,r1,1))", "label": "Success %", "id": "expr1" } ],
                  [ "ApplicationSignals", "Error", "Environment", "ecs:${PrimaryEcsCluster}", "Service", "ui", "Operation", "GET /orders", { "region": "${PrimaryRegion}", "id": "e1", "visible": false } ],
                  [ "ApplicationSignals", "Fault", "Environment", "ecs:${PrimaryEcsCluster}", "Service", "ui", "Operation", "GET /orders", { "region": "${PrimaryRegion}", "id": "f1", "visible": false } ],
                  [ "ApplicationSignals", "Latency", "Environment", "ecs:${PrimaryEcsCluster}", "Service", "ui", "Operation", "GET /orders", { "region": "${PrimaryRegion}", "id": "r1", "visible": false, "stat": "SampleCount" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "stat": "Sum", "period": 60,
                "yAxis": { "left": { "min": 0, "max": 100 } }
              }
            },
            {
              "height": 6, "width": 6, "y": 46, "x": 0,
              "type": "metric",
              "properties": {
                "title": "Home Success Rate (${SecondaryRegion})",
                "metrics": [
                  [ { "expression": "100*(1-(e1+f1)/IF(r1>0,r1,1))", "label": "Success %", "id": "expr1" } ],
                  [ "ApplicationSignals", "Error", "Environment", "ecs:${SecondaryEcsCluster}", "Service", "ui", "Operation", "GET /home", { "region": "${SecondaryRegion}", "id": "e1", "visible": false } ],
                  [ "ApplicationSignals", "Fault", "Environment", "ecs:${SecondaryEcsCluster}", "Service", "ui", "Operation", "GET /home", { "region": "${SecondaryRegion}", "id": "f1", "visible": false } ],
                  [ "ApplicationSignals", "Latency", "Environment", "ecs:${SecondaryEcsCluster}", "Service", "ui", "Operation", "GET /home", { "region": "${SecondaryRegion}", "id": "r1", "visible": false, "stat": "SampleCount" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "stat": "Sum", "period": 60,
                "yAxis": { "left": { "min": 0, "max": 100 } }
              }
            },
            {
              "height": 6, "width": 6, "y": 46, "x": 6,
