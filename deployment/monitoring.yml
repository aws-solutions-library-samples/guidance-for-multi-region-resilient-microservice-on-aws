AWSTemplateFormatVersion: "2010-09-09"
Description: "Canaries"

Parameters:
  Env:
    Type: String
    Default: ''
    Description: String to enable multiple deployments per AWS region
  PrimaryRegion:
    Type: String
    Description: Enter the Primary Region
    Default: "us-east-1"
  SecondaryRegion:
    Type: String
    Description: Enter the Secondary Region
    Default: "us-west-2"
  PrimaryEcsCluster:
    Type: String
    Description: ECS cluster name in primary region (for Application Signals Environment dimension)
    Default: ""
  SecondaryEcsCluster:
    Type: String
    Description: ECS cluster name in secondary region (for Application Signals Environment dimension)
    Default: ""

Resources:
  SystemDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub 'System-Dashboard-${AWS::Region}${Env}'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text", "height": 1, "width": 24, "y": 0, "x": 0,
              "properties": { "markdown": "## DNS Active Regions (1 = Active in DNS, 0 = Removed from DNS)" }
            },
            {
              "height": 6, "width": 12, "y": 1, "x": 0,
              "type": "metric",
              "properties": {
                "title": "${PrimaryRegion} DNS Status",
                "metrics": [
                  [ "ARC/DNSStatus", "RegionDNSActive", "Region", "${PrimaryRegion}", { "region": "${PrimaryRegion}", "label": "${PrimaryRegion} Active", "color": "#2ca02c" } ]
                ],
                "view": "singleValue",
                "region": "${PrimaryRegion}",
                "stat": "Minimum", "period": 60,
                "yAxis": { "left": { "min": 0, "max": 1 } }
              }
            },
            {
              "height": 6, "width": 12, "y": 1, "x": 12,
              "type": "metric",
              "properties": {
                "title": "${SecondaryRegion} DNS Status",
                "metrics": [
                  [ "ARC/DNSStatus", "RegionDNSActive", "Region", "${SecondaryRegion}", { "region": "${PrimaryRegion}", "label": "${SecondaryRegion} Active", "color": "#2ca02c" } ]
                ],
                "view": "singleValue",
                "region": "${PrimaryRegion}",
                "stat": "Minimum", "period": 60,
                "yAxis": { "left": { "min": 0, "max": 1 } }
              }
            },
                        {
              "height": 6, "width": 12, "y": 7, "x": 0,
              "type": "metric",
              "properties": {
                "metrics": [[ "ecommerce", "OrdersCreated${Env}", { "region": "${PrimaryRegion}" } ]],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "title": "OrdersCreated-${PrimaryRegion}",
                "period": 60, "stat": "Sum"
              }
            },
            {
              "height": 6, "width": 12, "y": 7, "x": 12,
              "type": "metric",
              "properties": {
                "metrics": [[ "ecommerce", "OrdersCreated${Env}", { "region": "${SecondaryRegion}" } ]],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "title": "OrdersCreated-${SecondaryRegion}",
                "period": 60, "stat": "Sum"
              }
            },
            {
              "type": "text", "height": 1, "width": 24, "y": 13, "x": 0,
              "properties": { "markdown": "## Canary Success Rate by Journey" }
            },
            {
              "height": 6, "width": 6, "y": 14, "x": 0,
              "type": "metric",
              "properties": {
                "title": "Home - Success % (${PrimaryRegion})",
                "metrics": [
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "lcl-rgnl-home${Env}", { "region": "${PrimaryRegion}", "label": "local" } ],
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "rmt-rgnl-home${Env}", { "region": "${PrimaryRegion}", "label": "remote" } ],
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "global-home${Env}", { "region": "${PrimaryRegion}", "label": "global" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "stat": "Average", "period": 60,
                "yAxis": { "left": { "min": 0, "max": 100 } }
              }
            },
            {
              "height": 6, "width": 6, "y": 14, "x": 6,
              "type": "metric",
              "properties": {
                "title": "Catalog - Success % (${PrimaryRegion})",
                "metrics": [
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "lcl-rgnl-catalog${Env}", { "region": "${PrimaryRegion}", "label": "local" } ],
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "rmt-rgnl-catalog${Env}", { "region": "${PrimaryRegion}", "label": "remote" } ],
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "global-catalog${Env}", { "region": "${PrimaryRegion}", "label": "global" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "stat": "Average", "period": 60,
                "yAxis": { "left": { "min": 0, "max": 100 } }
              }
            },
            {
              "height": 6, "width": 6, "y": 14, "x": 12,
              "type": "metric",
              "properties": {
                "title": "Cart - Success % (${PrimaryRegion})",
                "metrics": [
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "lcl-rgnl-cart${Env}", { "region": "${PrimaryRegion}", "label": "local" } ],
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "rmt-rgnl-cart${Env}", { "region": "${PrimaryRegion}", "label": "remote" } ],
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "global-cart${Env}", { "region": "${PrimaryRegion}", "label": "global" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "stat": "Average", "period": 60,
                "yAxis": { "left": { "min": 0, "max": 100 } }
              }
            },
            {
              "height": 6, "width": 6, "y": 14, "x": 18,
              "type": "metric",
              "properties": {
                "title": "Orders - Success % (${PrimaryRegion})",
                "metrics": [
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "lcl-rgnl-orders${Env}", { "region": "${PrimaryRegion}", "label": "local" } ],
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "rmt-rgnl-orders${Env}", { "region": "${PrimaryRegion}", "label": "remote" } ],
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "global-orders${Env}", { "region": "${PrimaryRegion}", "label": "global" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "stat": "Average", "period": 60,
                "yAxis": { "left": { "min": 0, "max": 100 } }
              }
            },
            {
              "height": 6, "width": 6, "y": 20, "x": 0,
              "type": "metric",
              "properties": {
                "title": "Home - Success % (${SecondaryRegion})",
                "metrics": [
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "lcl-rgnl-home${Env}", { "region": "${SecondaryRegion}", "label": "local" } ],
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "rmt-rgnl-home${Env}", { "region": "${SecondaryRegion}", "label": "remote" } ],
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "global-home${Env}", { "region": "${SecondaryRegion}", "label": "global" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "stat": "Average", "period": 60,
                "yAxis": { "left": { "min": 0, "max": 100 } }
              }
            },
            {
              "height": 6, "width": 6, "y": 20, "x": 6,
              "type": "metric",
              "properties": {
                "title": "Catalog - Success % (${SecondaryRegion})",
                "metrics": [
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "lcl-rgnl-catalog${Env}", { "region": "${SecondaryRegion}", "label": "local" } ],
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "rmt-rgnl-catalog${Env}", { "region": "${SecondaryRegion}", "label": "remote" } ],
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "global-catalog${Env}", { "region": "${SecondaryRegion}", "label": "global" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "stat": "Average", "period": 60,
                "yAxis": { "left": { "min": 0, "max": 100 } }
              }
            },
            {
              "height": 6, "width": 6, "y": 20, "x": 12,
              "type": "metric",
              "properties": {
                "title": "Cart - Success % (${SecondaryRegion})",
                "metrics": [
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "lcl-rgnl-cart${Env}", { "region": "${SecondaryRegion}", "label": "local" } ],
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "rmt-rgnl-cart${Env}", { "region": "${SecondaryRegion}", "label": "remote" } ],
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "global-cart${Env}", { "region": "${SecondaryRegion}", "label": "global" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "stat": "Average", "period": 60,
                "yAxis": { "left": { "min": 0, "max": 100 } }
              }
            },
            {
              "height": 6, "width": 6, "y": 20, "x": 18,
              "type": "metric",
              "properties": {
                "title": "Orders - Success % (${SecondaryRegion})",
                "metrics": [
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "lcl-rgnl-orders${Env}", { "region": "${SecondaryRegion}", "label": "local" } ],
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "rmt-rgnl-orders${Env}", { "region": "${SecondaryRegion}", "label": "remote" } ],
                  [ "CloudWatchSynthetics", "SuccessPercent", "CanaryName", "global-orders${Env}", { "region": "${SecondaryRegion}", "label": "global" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "stat": "Average", "period": 60,
                "yAxis": { "left": { "min": 0, "max": 100 } }
              }
            },
            {
              "type": "text", "height": 1, "width": 24, "y": 26, "x": 0,
              "properties": { "markdown": "## Canary Response Time by Journey" }
            },
            {
              "height": 6, "width": 6, "y": 27, "x": 0,
              "type": "metric",
              "properties": {
                "title": "Home - Duration ms (${PrimaryRegion})",
                "metrics": [
                  [ "CloudWatchSynthetics", "Duration", "CanaryName", "lcl-rgnl-home${Env}", { "region": "${PrimaryRegion}", "stat": "p50", "label": "local p50" } ],
                  [ "...", { "region": "${PrimaryRegion}", "stat": "p90", "label": "local p90" } ],
                  [ "...", { "region": "${PrimaryRegion}", "stat": "p99", "label": "local p99" } ],
                  [ "CloudWatchSynthetics", "Duration", "CanaryName", "rmt-rgnl-home${Env}", { "region": "${PrimaryRegion}", "stat": "p50", "label": "remote p50" } ],
                  [ "...", { "region": "${PrimaryRegion}", "stat": "p90", "label": "remote p90" } ],
                  [ "...", { "region": "${PrimaryRegion}", "stat": "p99", "label": "remote p99" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "period": 60
              }
            },
            {
              "height": 6, "width": 6, "y": 27, "x": 6,
              "type": "metric",
              "properties": {
                "title": "Catalog - Duration ms (${PrimaryRegion})",
                "metrics": [
                  [ "CloudWatchSynthetics", "Duration", "CanaryName", "lcl-rgnl-catalog${Env}", { "region": "${PrimaryRegion}", "stat": "p50", "label": "local p50" } ],
                  [ "...", { "region": "${PrimaryRegion}", "stat": "p90", "label": "local p90" } ],
                  [ "...", { "region": "${PrimaryRegion}", "stat": "p99", "label": "local p99" } ],
                  [ "CloudWatchSynthetics", "Duration", "CanaryName", "rmt-rgnl-catalog${Env}", { "region": "${PrimaryRegion}", "stat": "p50", "label": "remote p50" } ],
                  [ "...", { "region": "${PrimaryRegion}", "stat": "p90", "label": "remote p90" } ],
                  [ "...", { "region": "${PrimaryRegion}", "stat": "p99", "label": "remote p99" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "period": 60
              }
            },
            {
              "height": 6, "width": 6, "y": 27, "x": 12,
              "type": "metric",
              "properties": {
                "title": "Cart - Duration ms (${PrimaryRegion})",
                "metrics": [
                  [ "CloudWatchSynthetics", "Duration", "CanaryName", "lcl-rgnl-cart${Env}", { "region": "${PrimaryRegion}", "stat": "p50", "label": "local p50" } ],
                  [ "...", { "region": "${PrimaryRegion}", "stat": "p90", "label": "local p90" } ],
                  [ "...", { "region": "${PrimaryRegion}", "stat": "p99", "label": "local p99" } ],
                  [ "CloudWatchSynthetics", "Duration", "CanaryName", "rmt-rgnl-cart${Env}", { "region": "${PrimaryRegion}", "stat": "p50", "label": "remote p50" } ],
                  [ "...", { "region": "${PrimaryRegion}", "stat": "p90", "label": "remote p90" } ],
                  [ "...", { "region": "${PrimaryRegion}", "stat": "p99", "label": "remote p99" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "period": 60
              }
            },
            {
              "height": 6, "width": 6, "y": 27, "x": 18,
              "type": "metric",
              "properties": {
                "title": "Orders - Duration ms (${PrimaryRegion})",
                "metrics": [
                  [ "CloudWatchSynthetics", "Duration", "CanaryName", "lcl-rgnl-orders${Env}", { "region": "${PrimaryRegion}", "stat": "p50", "label": "local p50" } ],
                  [ "...", { "region": "${PrimaryRegion}", "stat": "p90", "label": "local p90" } ],
                  [ "...", { "region": "${PrimaryRegion}", "stat": "p99", "label": "local p99" } ],
                  [ "CloudWatchSynthetics", "Duration", "CanaryName", "rmt-rgnl-orders${Env}", { "region": "${PrimaryRegion}", "stat": "p50", "label": "remote p50" } ],
                  [ "...", { "region": "${PrimaryRegion}", "stat": "p90", "label": "remote p90" } ],
                  [ "...", { "region": "${PrimaryRegion}", "stat": "p99", "label": "remote p99" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "period": 60
              }
            },
            {
              "height": 6, "width": 6, "y": 33, "x": 0,
              "type": "metric",
              "properties": {
                "title": "Home - Duration ms (${SecondaryRegion})",
                "metrics": [
                  [ "CloudWatchSynthetics", "Duration", "CanaryName", "lcl-rgnl-home${Env}", { "region": "${SecondaryRegion}", "stat": "p50", "label": "local p50" } ],
                  [ "...", { "region": "${SecondaryRegion}", "stat": "p90", "label": "local p90" } ],
                  [ "...", { "region": "${SecondaryRegion}", "stat": "p99", "label": "local p99" } ],
                  [ "CloudWatchSynthetics", "Duration", "CanaryName", "rmt-rgnl-home${Env}", { "region": "${SecondaryRegion}", "stat": "p50", "label": "remote p50" } ],
                  [ "...", { "region": "${SecondaryRegion}", "stat": "p90", "label": "remote p90" } ],
                  [ "...", { "region": "${SecondaryRegion}", "stat": "p99", "label": "remote p99" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "period": 60
              }
            },
            {
              "height": 6, "width": 6, "y": 33, "x": 6,
              "type": "metric",
              "properties": {
                "title": "Catalog - Duration ms (${SecondaryRegion})",
                "metrics": [
                  [ "CloudWatchSynthetics", "Duration", "CanaryName", "lcl-rgnl-catalog${Env}", { "region": "${SecondaryRegion}", "stat": "p50", "label": "local p50" } ],
                  [ "...", { "region": "${SecondaryRegion}", "stat": "p90", "label": "local p90" } ],
                  [ "...", { "region": "${SecondaryRegion}", "stat": "p99", "label": "local p99" } ],
                  [ "CloudWatchSynthetics", "Duration", "CanaryName", "rmt-rgnl-catalog${Env}", { "region": "${SecondaryRegion}", "stat": "p50", "label": "remote p50" } ],
                  [ "...", { "region": "${SecondaryRegion}", "stat": "p90", "label": "remote p90" } ],
                  [ "...", { "region": "${SecondaryRegion}", "stat": "p99", "label": "remote p99" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "period": 60
              }
            },
            {
              "height": 6, "width": 6, "y": 33, "x": 12,
              "type": "metric",
              "properties": {
                "title": "Cart - Duration ms (${SecondaryRegion})",
                "metrics": [
                  [ "CloudWatchSynthetics", "Duration", "CanaryName", "lcl-rgnl-cart${Env}", { "region": "${SecondaryRegion}", "stat": "p50", "label": "local p50" } ],
                  [ "...", { "region": "${SecondaryRegion}", "stat": "p90", "label": "local p90" } ],
                  [ "...", { "region": "${SecondaryRegion}", "stat": "p99", "label": "local p99" } ],
                  [ "CloudWatchSynthetics", "Duration", "CanaryName", "rmt-rgnl-cart${Env}", { "region": "${SecondaryRegion}", "stat": "p50", "label": "remote p50" } ],
                  [ "...", { "region": "${SecondaryRegion}", "stat": "p90", "label": "remote p90" } ],
                  [ "...", { "region": "${SecondaryRegion}", "stat": "p99", "label": "remote p99" } ]
                ],
