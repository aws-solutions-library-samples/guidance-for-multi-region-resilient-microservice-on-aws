              "properties": {
                "title": "Orders - Duration ms (${SecondaryRegion})",
                "metrics": [
                  [ "CloudWatchSynthetics", "Duration", "CanaryName", "lcl-rgnl-orders${Env}", { "region": "${SecondaryRegion}", "stat": "p50", "label": "local p50" } ],
                  [ "...", { "region": "${SecondaryRegion}", "stat": "p90", "label": "local p90" } ],
                  [ "...", { "region": "${SecondaryRegion}", "stat": "p99", "label": "local p99" } ],
                  [ "CloudWatchSynthetics", "Duration", "CanaryName", "rmt-rgnl-orders${Env}", { "region": "${SecondaryRegion}", "stat": "p50", "label": "remote p50" } ],
                  [ "...", { "region": "${SecondaryRegion}", "stat": "p90", "label": "remote p90" } ],
                  [ "...", { "region": "${SecondaryRegion}", "stat": "p99", "label": "remote p99" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "period": 60
              }
            },
            {
              "type": "text", "height": 1, "width": 24, "y": 39, "x": 0,
              "properties": { "markdown": "## Application Signals - All Traffic (Success Rate)" }
            },
            {
              "height": 6, "width": 6, "y": 40, "x": 0,
              "type": "metric",
              "properties": {
                "title": "Home Success Rate (${PrimaryRegion})",
                "metrics": [
                  [ { "expression": "100*(1-(e1+f1)/IF(r1>0,r1,1))", "label": "Success %", "id": "expr1" } ],
                  [ "ApplicationSignals", "Error", "Environment", "ecs:${PrimaryEcsCluster}", "Service", "ui", "Operation", "GET /home", { "region": "${PrimaryRegion}", "id": "e1", "visible": false } ],
                  [ "ApplicationSignals", "Fault", "Environment", "ecs:${PrimaryEcsCluster}", "Service", "ui", "Operation", "GET /home", { "region": "${PrimaryRegion}", "id": "f1", "visible": false } ],
                  [ "ApplicationSignals", "Latency", "Environment", "ecs:${PrimaryEcsCluster}", "Service", "ui", "Operation", "GET /home", { "region": "${PrimaryRegion}", "id": "r1", "visible": false, "stat": "SampleCount" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "stat": "Sum", "period": 60,
                "yAxis": { "left": { "min": 0, "max": 100 } }
              }
            },
            {
              "height": 6, "width": 6, "y": 40, "x": 6,
              "type": "metric",
              "properties": {
                "title": "Catalog Success Rate (${PrimaryRegion})",
                "metrics": [
                  [ { "expression": "100*(1-(e1+f1)/IF(r1>0,r1,1))", "label": "Success %", "id": "expr1" } ],
                  [ "ApplicationSignals", "Error", "Environment", "ecs:${PrimaryEcsCluster}", "Service", "ui", "Operation", "GET /catalog", { "region": "${PrimaryRegion}", "id": "e1", "visible": false } ],
                  [ "ApplicationSignals", "Fault", "Environment", "ecs:${PrimaryEcsCluster}", "Service", "ui", "Operation", "GET /catalog", { "region": "${PrimaryRegion}", "id": "f1", "visible": false } ],
                  [ "ApplicationSignals", "Latency", "Environment", "ecs:${PrimaryEcsCluster}", "Service", "ui", "Operation", "GET /catalog", { "region": "${PrimaryRegion}", "id": "r1", "visible": false, "stat": "SampleCount" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "stat": "Sum", "period": 60,
                "yAxis": { "left": { "min": 0, "max": 100 } }
              }
            },
            {
              "height": 6, "width": 6, "y": 40, "x": 12,
              "type": "metric",
              "properties": {
                "title": "Cart Success Rate (${PrimaryRegion})",
                "metrics": [
                  [ { "expression": "100*(1-(e1+f1)/IF(r1>0,r1,1))", "label": "Success %", "id": "expr1" } ],
                  [ "ApplicationSignals", "Error", "Environment", "ecs:${PrimaryEcsCluster}", "Service", "ui", "Operation", "GET /cart", { "region": "${PrimaryRegion}", "id": "e1", "visible": false } ],
                  [ "ApplicationSignals", "Fault", "Environment", "ecs:${PrimaryEcsCluster}", "Service", "ui", "Operation", "GET /cart", { "region": "${PrimaryRegion}", "id": "f1", "visible": false } ],
                  [ "ApplicationSignals", "Latency", "Environment", "ecs:${PrimaryEcsCluster}", "Service", "ui", "Operation", "GET /cart", { "region": "${PrimaryRegion}", "id": "r1", "visible": false, "stat": "SampleCount" } ]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${PrimaryRegion}",
                "stat": "Sum", "period": 60,
                "yAxis": { "left": { "min": 0, "max": 100 } }
