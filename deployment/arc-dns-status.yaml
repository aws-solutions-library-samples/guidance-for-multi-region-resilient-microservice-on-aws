AWSTemplateFormatVersion: "2010-09-09"
Description: "Lambda that resolves the app DNS name from within the VPC and publishes routing metrics per source region"

Parameters:
  Env:
    Type: String
    Default: ''
  DnsName:
    Type: String
    Description: The application DNS name (e.g. store.demo.io)
  PrimaryRegion:
    Type: String
    Default: "us-east-1"
  SecondaryRegion:
    Type: String
    Default: "us-west-2"
  PrimaryAlbDns:
    Type: String
    Description: ALB DNS name for primary region
  SecondaryAlbDns:
    Type: String
    Description: ALB DNS name for secondary region
  SubnetId:
    Type: String
    Description: VPC subnet for the Lambda
  SecurityGroupId:
    Type: String
    Description: Security group for the Lambda

Resources:
  DnsStatusRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: put-metrics
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: "*"

  DnsStatusFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub app-dns-status${Env}
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt DnsStatusRole.Arn
      Timeout: 30
      VpcConfig:
        SubnetIds: [!Ref SubnetId]
        SecurityGroupIds: [!Ref SecurityGroupId]
      Environment:
        Variables:
          DNS_NAME: !Ref DnsName
          PRIMARY_REGION: !Ref PrimaryRegion
          SECONDARY_REGION: !Ref SecondaryRegion
          PRIMARY_ALB_DNS: !Ref PrimaryAlbDns
          SECONDARY_ALB_DNS: !Ref SecondaryAlbDns
      Code:
        ZipFile: |
          import socket, boto3, os

          def resolve_ips(name):
              try:
                  return set(r[4][0] for r in socket.getaddrinfo(name, 80))
              except Exception:
                  return set()

          def handler(event, context):
              source = os.environ['AWS_REGION']
              dns_ips = resolve_ips(os.environ['DNS_NAME'])
              primary_ips = resolve_ips(os.environ['PRIMARY_ALB_DNS'])
              secondary_ips = resolve_ips(os.environ['SECONDARY_ALB_DNS'])

              metrics = [
                  {'MetricName': 'RoutingToEast', 'Dimensions': [{'Name': 'SourceRegion', 'Value': source}], 'Value': 1.0 if dns_ips & primary_ips else 0.0, 'Unit': 'None'},
                  {'MetricName': 'RoutingToWest', 'Dimensions': [{'Name': 'SourceRegion', 'Value': source}], 'Value': 1.0 if dns_ips & secondary_ips else 0.0, 'Unit': 'None'},
              ]
              boto3.client('cloudwatch').put_metric_data(Namespace='ARC/DNSStatus', MetricData=metrics)
              return {'source': source, 'dns_ips': list(dns_ips), 'metrics': metrics}

  DnsStatusSchedule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(1 minute)
      State: ENABLED
      Targets:
        - Id: DnsStatusFunction
          Arn: !GetAtt DnsStatusFunction.Arn

  DnsStatusPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DnsStatusFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DnsStatusSchedule.Arn
