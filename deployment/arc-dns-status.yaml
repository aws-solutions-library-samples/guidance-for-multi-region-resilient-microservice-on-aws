AWSTemplateFormatVersion: "2010-09-09"
Description: "Lambda that resolves the app DNS name from within the VPC and publishes per-region active status metrics"

Parameters:
  Env:
    Type: String
    Default: ''
  PrimaryRegion:
    Type: String
    Default: "us-east-1"
  SecondaryRegion:
    Type: String
    Default: "us-west-2"
  PrimaryAlbDns:
    Type: String
    Description: ALB DNS name for primary region
  SecondaryAlbDns:
    Type: String
    Description: ALB DNS name for secondary region
  SubnetId:
    Type: String
    Description: VPC subnet for the Lambda
  SecurityGroupId:
    Type: String
    Description: Security group for the Lambda

Resources:
  DnsStatusRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: put-metrics
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: "*"

  DnsStatusFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub app-dns-status${Env}
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt DnsStatusRole.Arn
      Timeout: 30
      VpcConfig:
        SubnetIds: [!Ref SubnetId]
        SecurityGroupIds: [!Ref SecurityGroupId]
      Environment:
        Variables:
          PRIMARY_REGION: !Ref PrimaryRegion
          SECONDARY_REGION: !Ref SecondaryRegion
          PRIMARY_ALB_DNS: !Ref PrimaryAlbDns
          SECONDARY_ALB_DNS: !Ref SecondaryAlbDns
      Code:
        ZipFile: |
          import urllib.request, boto3, os

          def check_alb(alb_dns):
              try:
                  req = urllib.request.Request(
                      f'http://{alb_dns}/actuator/health',
                      headers={'User-Agent': 'dns-status-check'}
                  )
                  with urllib.request.urlopen(req, timeout=5) as r:
                      return 1.0 if r.status < 500 else 0.0
              except Exception:
                  return 0.0

          def handler(event, context):
              metrics = [
                  {
                      'MetricName': 'RegionDNSActive',
                      'Dimensions': [{'Name': 'Region', 'Value': os.environ['PRIMARY_REGION']}],
                      'Value': check_alb(os.environ['PRIMARY_ALB_DNS']),
                      'Unit': 'None'
                  },
                  {
                      'MetricName': 'RegionDNSActive',
                      'Dimensions': [{'Name': 'Region', 'Value': os.environ['SECONDARY_REGION']}],
                      'Value': check_alb(os.environ['SECONDARY_ALB_DNS']),
                      'Unit': 'None'
                  }
              ]
              boto3.client('cloudwatch').put_metric_data(
                  Namespace='ARC/DNSStatus', MetricData=metrics
              )
              return {'metrics': metrics}

  DnsStatusSchedule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(1 minute)
      State: ENABLED
      Targets:
        - Id: DnsStatusFunction
          Arn: !GetAtt DnsStatusFunction.Arn

  DnsStatusPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DnsStatusFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DnsStatusSchedule.Arn
