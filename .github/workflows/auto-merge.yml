name: Auto Merge Dependabot PRs

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'pull_request_target' &&
       github.actor == 'dependabot[bot]' &&
       contains(github.event.pull_request.labels.*.name, 'auto-merge')) ||
      (github.event_name == 'check_suite' &&
       github.event.check_suite.conclusion == 'success')
    steps:
      - name: Merge eligible Dependabot PRs
        run: |
          # For check_suite events, find open Dependabot PRs with auto-merge label
          if [ "$EVENT_NAME" = "check_suite" ]; then
            prs=$(gh pr list --repo "$GITHUB_REPOSITORY" --author "app/dependabot" \
              --label "auto-merge" --json number,mergeable \
              --jq '.[] | select(.mergeable == "MERGEABLE") | .number')
          else
            prs="$PR_NUMBER"
          fi

          for pr in $prs; do
            echo "Attempting to merge PR #$pr..."
            gh pr merge "$pr" --repo "$GITHUB_REPOSITORY" --squash --admin \
              --delete-branch 2>&1 || echo "PR #$pr not ready to merge yet"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
